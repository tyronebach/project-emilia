services:
  backend:
    build: ./backend
    image: emilia-backend:latest
    container_name: emilia-backend
    restart: unless-stopped
    network_mode: host

    env_file:
      - /home/tbach/.openclaw/secrets.env

    environment:
      - STT_SERVICE_URL=http://192.168.88.252:8765
      - CLAWDBOT_URL=http://127.0.0.1:18789
      - CLAWDBOT_TOKEN=98c881b6e395081ac71e0ac24694b84048d3e41c81b2d95b
      - AUTH_TOKEN=emilia-dev-token-2026
      - AUTH_ALLOW_DEV_TOKEN=1
      - ALLOWED_ORIGINS=http://localhost:3000,http://192.168.88.237:3000,https://localhost:3443,https://192.168.88.237:3443
      - ELEVENLABS_VOICE_ID=21m00Tcm4TlvDq8ikWAM
      - ELEVENLABS_MODEL=eleven_turbo_v2_5
      - CLAWDBOT_AGENTS_DIR=/home/tbach/.openclaw/agents

    volumes:
      - /home/tbach/clawd-agents:/home/tbach/clawd-agents:rw
      - ./data:/data:rw

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  frontend:
    image: nginx:alpine
    container_name: emilia-frontend
    restart: unless-stopped
    network_mode: host

    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certs:/etc/nginx/certs:ro

    depends_on:
      - backend

    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "--no-check-certificate", "https://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

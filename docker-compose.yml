services:
  backend:
    build: ./backend
    image: emilia-backend:latest
    container_name: emilia-backend
    restart: unless-stopped
    network_mode: host

    env_file:
      - /home/tbach/.openclaw/secrets.env

    environment:
      - CLAWDBOT_TOKEN=${CLAWDBOT_GATEWAY_TOKEN}
      - STT_SERVICE_URL=http://192.168.88.252:8765
      - CLAWDBOT_URL=http://127.0.0.1:18789
      - AUTH_TOKEN=emilia-dev-token-2026
      - AUTH_ALLOW_DEV_TOKEN=1
      - ALLOWED_ORIGINS=http://localhost:3000,http://192.168.88.237:3000,https://localhost:3443,https://192.168.88.237:3443
      - ELEVENLABS_VOICE_ID=21m00Tcm4TlvDq8ikWAM
      - ELEVENLABS_MODEL=eleven_turbo_v2_5
      - CLAWDBOT_AGENTS_DIR=/home/tbach/.openclaw/agents

    volumes:
      - /home/tbach/clawd-agents:/home/tbach/clawd-agents:rw
      - ./data:/data:rw
      - /home/tbach/.openclaw/agents:/home/tbach/.openclaw/agents:ro

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

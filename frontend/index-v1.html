<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emilia - Voice Assistant</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🎙️ Emilia</h1>
            <p class="subtitle">Voice Assistant (Alpha)</p>
            <div class="status-indicator" id="statusIndicator">
                <span class="status-dot"></span>
                <span id="statusText">Ready</span>
            </div>
        </header>

        <main>
            <div class="ptt-container">
                <button 
                    id="pttButton" 
                    class="ptt-button"
                    disabled
                >
                    <div class="ptt-icon">
                        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                            <path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="23"></line>
                            <line x1="8" y1="23" x2="16" y2="23"></line>
                        </svg>
                    </div>
                    <span class="ptt-text">Hold to Talk</span>
                </button>
                <p class="ptt-hint">Press and hold the button, then speak</p>
            </div>

            <div class="response-container">
                <div class="response-section" id="transcriptionSection" style="display: none;">
                    <h3>📝 Transcription</h3>
                    <div class="response-box" id="transcriptionBox"></div>
                    <div class="response-meta" id="transcriptionMeta"></div>
                </div>

                <div class="response-section" id="responseSection" style="display: none;">
                    <h3>💬 Response</h3>
                    <div class="response-box" id="responseBox"></div>
                </div>
            </div>

            <div class="debug-panel" id="debugPanel">
                <h4>Debug Info</h4>
                <pre id="debugLog"></pre>
            </div>
        </main>

        <footer>
            <p>Milestone 1: Push-to-Talk + STT Integration</p>
            <p class="version">v1.0.0 | Built by Ram 🩷</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
